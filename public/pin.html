<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter PIN — MicroMonitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090a0f;
      --card: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8eaed;
      --muted: #8b92a5;
      --blue: #2979ff;
      --blue-glow: rgba(41, 121, 255, 0.35);
      --red: #ff1744;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #090a0f 0%, #0d0f19 100%);
      color: var(--text);
    }

    .pin-card {
      width: 100%;
      max-width: 380px;
      padding: 32px 28px;
      border-radius: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
    }

    .pin-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--blue);
    }

    .pin-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-glow);
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: var(--blue);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover { opacity: 0.92; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      margin-top: 14px;
      font-size: 13px;
      color: var(--red);
      text-align: center;
      min-height: 18px;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .shake { animation: shake 0.35s ease; }
  </style>
</head>
<body>
  <div class="pin-card" id="pin-card">
    <div class="pin-brand">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      MicroMonitor
    </div>
    <p class="pin-subtitle">Enter your PIN to access the dashboard</p>

    <form id="pin-form">
      <label for="pin-input">PIN</label>
      <input id="pin-input" type="password" inputmode="numeric" autocomplete="off" autofocus maxlength="12" placeholder="••••">
      <button type="submit" id="pin-submit">Unlock</button>
    </form>
    <p class="error" id="pin-error"></p>
  </div>

  <script>
    const form = document.getElementById('pin-form');
    const input = document.getElementById('pin-input');
    const errorEl = document.getElementById('pin-error');
    const card = document.getElementById('pin-card');
    const submitBtn = document.getElementById('pin-submit');

    let redirecting = false;

    // Check if already authenticated — if yes, go straight to dashboard
    const token = localStorage.getItem('mm_token');
    const headers = token ? { 'Authorization': `Bearer ${token}` } : {};

    fetch('/api/auth/check', { headers })
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data && data.authenticated && !redirecting) {
          redirecting = true;
          window.location.replace('/');
        } else if (!data || !data.authenticated) {
          // Token is stale/invalid — clear it so socket won't fail
          localStorage.removeItem('mm_token');
        }
      })
      .catch(() => {
        localStorage.removeItem('mm_token');
      });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (redirecting) return;
      errorEl.textContent = '';
      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/auth/pin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin: input.value.trim() })
        });
        const data = await res.json();

        if (res.ok && data.success) {
          if (data.token) {
            localStorage.setItem('mm_token', data.token);
          }
          redirecting = true;
          window.location.replace('/');
          return;
        }

        errorEl.textContent = data.error || 'Invalid PIN';
        card.classList.remove('shake');
        void card.offsetWidth;
        card.classList.add('shake');
        input.value = '';
        input.focus();
      } catch {
        errorEl.textContent = 'Connection failed. Try again.';
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
